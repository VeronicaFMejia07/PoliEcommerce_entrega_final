 <section class="py-8" aria-labelledby="contacto-title">
  <div class="mx-auto w-full max-w-container px-4 lg:px-6">
    <h1 id="contacto-title" class="mb-2 text-center text-[clamp(1.15rem,2.5vw,1.4rem)] font-bold tracking-[0.08em]">CONTÁCTANOS</h1>
    <p class="mb-6 text-[0.9rem] leading-relaxed text-[#333]">¿Tienes preguntas, comentarios o necesitas ayuda? Estamos aquí para ayudarte. Puedes contactarnos diligenciando el siguiente formulario:</p>

    <form [formGroup]="formContact" (ngSubmit)="onSubmit()">
      <div class="my-4">
        <label for="name" class="mb-1 block font-medium text-[clamp(0.8rem,2.5vw,0.5rem)]">Nombres y Apellidos *</label>
        <input type="text" id="name" name="name" formControlName="name" class="w-full rounded-full border-0 bg-surface-muted py-2.5 pl-10 pr-4 text-[0.8rem] font-medium tracking-wide text-[#1a1a1a] placeholder:text-[#666] focus:outline focus:outline-2 focus:outline-offset-0 focus:outline-brand-cyan" required>
      </div>

      <div class="my-4">
        <label for="email" class="mb-1 block font-medium text-[clamp(0.8rem,2.5vw,0.5rem)]">Correo Electrónico *</label>
        <input type="email" id="email" name="email" formControlName="email" class="w-full rounded-full border-0 bg-surface-muted py-2.5 pl-10 pr-4 text-[0.8rem] font-medium tracking-wide text-[#1a1a1a] placeholder:text-[#666] focus:outline focus:outline-2 focus:outline-offset-0 focus:outline-brand-cyan"  required>
      </div>

      <div class="my-4">
        <label for="user_subject" class="mb-1 block font-medium text-[clamp(0.8rem,2.5vw,0.5rem)]">Asunto *</label>
        <input type="text" id="user_subject" name="user_subject" formControlName="user_subject" class="w-full rounded-full border-0 bg-surface-muted py-2.5 pl-10 pr-4 text-[0.8rem] font-medium tracking-wide text-[#1a1a1a] placeholder:text-[#666] focus:outline focus:outline-2 focus:outline-offset-0 focus:outline-brand-cyan"  required>
      </div>

      <div class="my-4">
        <label for="message" class="mb-1 block font-medium text-[clamp(0.8rem,2.5vw,0.5rem)]">Mensaje *</label>
        <textarea id="message" name="message" formControlName="message" class="w-full rounded-full border-0 bg-surface-muted py-2.5 pl-10 pr-4 text-[0.8rem] font-medium tracking-wide text-[#1a1a1a] placeholder:text-[#666] focus:outline focus:outline-2 focus:outline-offset-0 focus:outline-brand-cyan"  required></textarea>
      </div>

      <div class="flex justify-center w-full">
        <button type="submit" class="mt-auto inline-flex w-full max-w-[200px] items-center justify-center rounded-md bg-navy px-[10px] py-2.5 text-center text-[0.8rem] font-bold tracking-wide text-white transition-opacity hover:opacity-[0.92]">Enviar</button>
      </div>
    </form>
  </div>
</section>
